<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rutas BFS de Vuelos</title>
  <style>
    :root {
      --bg: #183a50;
      --panel: #ffffff;
      --text: #1f2933;
      --accent: #d35400;
      --accent-soft: #ffe8d6;
      --error: #9b2226;
      --ok: #2a9d8f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, #ffe8d6 0, transparent 35%),
        radial-gradient(circle at 80% 80%, #e9f5db 0, transparent 30%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(680px, 100%);
      background: var(--panel);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(31, 41, 51, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.5rem, 3vw, 2rem);
      color: #db0606;
    }

    p {
      margin: 0 0 20px;
      color: #52606d;
    }

    form {
      display: grid;
      gap: 12px;
    }

    label {
      font-weight: 600;
      font-size: 0.95rem;
    }

    select,
    button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #d9d9d9;
      padding: 10px 12px;
      font-size: 1rem;
    }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      margin-top: 6px;
      transition: transform 0.1s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .alert {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      background: #fdecea;
      color: var(--error);
      border: 1px solid #f5c2c7;
    }

    .result {
      margin-top: 16px;
      padding: 14px;
      border-radius: 10px;
      background: var(--accent-soft);
      border: 1px solid #f4c6a5;
    }

    .route {
      margin-top: 6px;
      color: var(--ok);
      font-weight: 700;
      word-break: break-word;
    }

    @media (max-width: 600px) {
      .card {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Despliegue BFS - Vuelos</h1>
    <p>Selecciona ciudad inicial y destino para encontrar la ruta con busqueda en amplitud.</p>

    <form method="post">
      {% csrf_token %}

      <label for="estado_inicial">Estado inicial</label>
      <select id="estado_inicial" name="estado_inicial" required>
        <option value="">-- Selecciona una ciudad --</option>
        {% for ciudad in ciudades %}
          <option value="{{ ciudad }}">{{ ciudad }}</option>
        {% endfor %}
      </select>

      <label for="estado_destino">Estado destino</label>
      <select id="estado_destino" name="estado_destino" required>
        <option value="">-- Selecciona una ciudad --</option>
        {% for ciudad in ciudades %}
          <option value="{{ ciudad }}">{{ ciudad }}</option>
        {% endfor %}
      </select>

      <button type="submit">Buscar ruta</button>
    </form>

    {% if error %}
      <div class="alert">{{ error }}</div>
    {% endif %}

    {% if ruta %}
      <div class="result">
        <strong>Ruta encontrada:</strong>
        <div class="route">{{ ruta|join:" -> " }}</div>
      </div>
    {% endif %}
  </main>
</body>
</html>
